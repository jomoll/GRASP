_resume: false
agent:
  module: src.client.agents.HTTPAgent
  parameters:
    body:
      max_tokens: 8192
      model: gpt-oss-120b
      temperature: 0.2
    headers:
      Authorization: Bearer <REDACTED>
      Content-Type: application/json
    prompter:
      args:
        agent_role: assistant
      name: role_content_dict
    url: <REDACTED>
cycle:
  batch_concurrency: 4
  epochs: 10
  grpo_eval_n: 40
  grpo_k: 4
  max_learned_skills: 10
  max_proposals: 1
  proposal_temperature: 0.8
  run_baseline: true
  seed: 2
  update_every: 50
data:
  dev: data/webshop/split_dev.json
  val: data/webshop/split_val.json
eval:
  module: src.server.tasks.webshop.eval
output_dir: outputs/skill_cycle_webshop
skills:
  base_dir: skills/webshop/base
task:
  controller_address: http://localhost:5090/api
  name: webshop-std
