_resume: true
agent:
  module: src.client.agents.OpenAIResponsesAgent
  parameters:
    base_url: <REDACTED>
    max_output_tokens: 65536
    model: <REDACTED>-06-gpt-5.4-2026-03-05
    reasoning_effort: low
    text_verbosity: low
    timeout: 1800
cycle:
  batch_concurrency: 2
  epochs: 5
  run_baseline: true
  seed: 1
  update_every: 48
data:
  dev: data/medagentbench/split_dev.json
  full: data/medagentbench/test_data_v2.json
  id_test: data/medagentbench/split_id_test.json
