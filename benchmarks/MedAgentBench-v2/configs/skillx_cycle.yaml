# skillx_cycle — SkillX
# Model backend: select with --agent / GRASP_BACKEND, or change agent_preset.
# See configs/agents/README.md for the available presets.
output_dir: outputs/skillx_cycle
agent_preset: gptoss
updater:
  module: src.client.agents.LiteLLMAgent
  parameters:
    model: azure/gpt-4.1
    api_version: 2024-12-01-preview
    temperature: 0.7
    max_output_tokens: 32768
    timeout: 120
task:
  name: medagentbench-v2-skill
  controller_address: http://localhost:5070/api
  fhir_api_base: http://localhost:8080/fhir/
data:
  full: data/medagentbench/new_patient_tasks.json
  dev: data/medagentbench/split_dev.json
  val: data/medagentbench/split_val.json
  test: data/medagentbench/split_test.json
  id_test: data/medagentbench/split_id_test.json
skillx:
  skill_type: functional
  retrieval_top_k: 5
  filter_stage1: true
  filter_stage2: false
  use_plan_extraction: true
  enable_llm_merge: true
  extractor_max_retries: 2
  plan_extractor_max_retries: 1
  max_history_messages: 24
  max_message_chars: 1200
  max_action_chars: 600
  max_actions: 12
cycle:
  epochs: 5
  update_every: 48
  batch_concurrency: 5
  run_baseline: true
  seed: 1
