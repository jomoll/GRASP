# gpt-oss-120b, self-hosted behind an OpenAI-compatible endpoint
# (vLLM / SGLang / LiteLLM proxy). Required env: OSS_API_BASE.
# Optional env: OSS_API_KEY (default "EMPTY"), OSS_MODEL (default "gpt-oss-120b").
module: src.client.agents.HTTPAgent
parameters:
  url: "${OSS_API_BASE}/chat/completions"
  headers:
    Authorization: "Bearer ${OSS_API_KEY:-EMPTY}"
    Content-Type: "application/json"
  body:
    model: "${OSS_MODEL:-gpt-oss-120b}"
    temperature: 0.0
    max_tokens: 8192
  prompter:
    name: role_content_dict
    args:
      agent_role: "assistant"
